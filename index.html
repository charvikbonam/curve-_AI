<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curve AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-card p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
        }

        .login-card input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .error-msg, .success-msg {
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .error-msg { background: #fee; color: #c33; }
        .success-msg { background: #d4edda; color: #155724; }

        .app {
            display: none;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .new-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .conversations {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .conv-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conv-item:hover { background: #f0f0f0; }
        .conv-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .conv-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .conv-date { font-size: 11px; opacity: 0.6; margin-top: 4px; }
        .delete-conv { opacity: 0; background: none; border: none; cursor: pointer; font-size: 16px; color: #999; }
        .conv-item:hover .delete-conv { opacity: 1; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
        }

        .footer-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            cursor: pointer;
        }

        .footer-btn:hover { background: #f0f0f0; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f9f9f9;
        }

        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .assistant .message-content {
            background: white;
            color: #333;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .typing {
            display: none;
            padding: 12px 18px;
            background: white;
            border-radius: 20px;
            width: fit-content;
            margin-left: 24px;
            margin-bottom: 20px;
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e5e5e5;
            border-radius: 30px;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .welcome { text-align: center; margin-top: 100px; }
        .welcome-icon { font-size: 64px; margin-bottom: 20px; }
        .welcome h2 { font-size: 28px; margin-bottom: 8px; }
        .welcome p { color: #666; }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h1>Curve AI</h1>
        <p id="authSubtitle">Sign in to continue</p>
        <div id="loginPanel">
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="doLogin()">Sign In</button>
            <div class="switch-link"><a onclick="showSignup()">Create an account</a></div>
        </div>
        <div id="signupPanel" style="display:none">
            <input type="text" id="signupUser" placeholder="Username">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPass" placeholder="Password">
            <button onclick="doSignup()">Create Account</button>
            <div class="switch-link"><a onclick="showLogin()">Back to Sign In</a></div>
        </div>
        <div id="authMsg" class="error-msg"></div>
    </div>
</div>

<div class="app" id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Curve AI</h2>
            <button class="new-btn" onclick="newChat()">+ New</button>
        </div>
        <div class="conversations" id="convList">
            <div style="padding: 20px; text-align: center; color: #999;">No conversations</div>
        </div>
        <div class="sidebar-footer">
            <button class="footer-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar" id="avatar">U</div>
                <span id="username">User</span>
            </div>
            <button class="footer-btn" onclick="clearChat()">Clear</button>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="welcome">
                <div class="welcome-icon">✨</div>
                <h2>Curve AI</h2>
                <p>Your intelligent assistant</p>
            </div>
        </div>
        
        <div class="typing" id="typing"><span></span><span></span><span></span></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // Groq API Configuration
    const GROQ_API_KEY = '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';
    const MODEL = 'llama-3.1-8b-instant';
    
    // Account System
    let currentUser = null;
    let currentChatId = null;
    let conversations = [];
    let users = JSON.parse(localStorage.getItem('curve_users')) || [];

    function showSignup() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('signupPanel').style.display = 'block';
        document.getElementById('authSubtitle').innerText = 'Create an account';
        document.getElementById('authMsg').style.display = 'none';
    }

    function showLogin() {
        document.getElementById('signupPanel').style.display = 'none';
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('authSubtitle').innerText = 'Sign in to continue';
        document.getElementById('authMsg').style.display = 'none';
    }

    function showMsg(msg, isError = true) {
        const el = document.getElementById('authMsg');
        el.textContent = msg;
        el.className = isError ? 'error-msg' : 'success-msg';
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function doSignup() {
        const username = document.getElementById('signupUser').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPass').value;

        if (!username || !email || !password) return showMsg('Fill all fields');
        if (password.length < 4) return showMsg('Password too short');
        if (users.find(u => u.username === username)) return showMsg('Username exists');

        users.push({ id: Date.now(), username, email, password, chats: [] });
        localStorage.setItem('curve_users', JSON.stringify(users));
        showMsg('Account created! Please login.', false);
        showLogin();
    }

    function doLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        const user = users.find(u => u.username === username && u.password === password);
        
        if (!user) return showMsg('Invalid credentials');

        currentUser = user;
        localStorage.setItem('curve_current', JSON.stringify({ id: user.id, name: user.username }));
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('avatar').innerText = user.username.charAt(0).toUpperCase();
        document.getElementById('username').innerText = user.username;
        
        conversations = user.chats || [];
        renderSidebar();
        if (conversations.length) loadChat(conversations[0].id);
        else newChat();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('curve_current');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }

    function saveToUser() {
        if (currentUser) {
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) {
                users[idx].chats = conversations;
                localStorage.setItem('curve_users', JSON.stringify(users));
            }
        }
    }

    function renderSidebar() {
        const container = document.getElementById('convList');
        if (!conversations.length) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No conversations</div>';
            return;
        }
        container.innerHTML = conversations.map(c => `
            <div class="conv-item ${currentChatId === c.id ? 'active' : ''}" onclick="loadChat('${c.id}')">
                <div>
                    <div class="conv-title">${escapeHtml(c.title)}</div>
                    <div class="conv-date">${formatDate(c.updated)}</div>
                </div>
                <button class="delete-conv" onclick="event.stopPropagation(); deleteChat('${c.id}')">🗑️</button>
            </div>
        `).join('');
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = conversations.find(c => c.id === id);
        if (!chat) return;
        
        document.getElementById('messagesArea').innerHTML = '';
        if (chat.messages) {
            chat.messages.forEach(m => addMessageToUI(m.text, m.sender));
        }
        renderSidebar();
    }

    function newChat() {
        const newId = Date.now().toString();
        const newChatObj = {
            id: newId,
            title: 'New Chat',
            messages: [],
            created: new Date().toISOString(),
            updated: new Date().toISOString()
        };
        conversations.unshift(newChatObj);
        currentChatId = newId;
        saveToUser();
        
        document.getElementById('messagesArea').innerHTML = `
            <div class="welcome">
                <div class="welcome-icon">✨</div>
                <h2>Curve AI</h2>
                <p>Start a new conversation</p>
            </div>
        `;
        renderSidebar();
    }

    function deleteChat(id) {
        if (confirm('Delete this conversation?')) {
            conversations = conversations.filter(c => c.id !== id);
            if (currentChatId === id) {
                if (conversations.length) loadChat(conversations[0].id);
                else newChat();
            }
            saveToUser();
            renderSidebar();
        }
    }

    function clearChat() {
        if (currentChatId) {
            const chat = conversations.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages = [];
                chat.updated = new Date().toISOString();
                saveToUser();
                loadChat(currentChatId);
            }
        }
    }

    function addMessageToUI(text, sender) {
        const container = document.getElementById('messagesArea');
        const welcome = container.querySelector('.welcome');
        if (welcome) welcome.remove();
        
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `<div class="message-content">${sender === 'assistant' ? formatText(text) : escapeHtml(text)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const msg = input.value.trim();
        if (!msg) return;
        
        input.value = '';
        addMessageToUI(msg, 'user');
        
        let chat = conversations.find(c => c.id === currentChatId);
        if (!chat) {
            newChat();
            chat = conversations.find(c => c.id === currentChatId);
        }
        if (!chat.messages) chat.messages = [];
        chat.messages.push({ text: msg, sender: 'user' });
        if (chat.title === 'New Chat') chat.title = msg.slice(0, 30);
        chat.updated = new Date().toISOString();
        saveToUser();
        renderSidebar();
        
        document.getElementById('typing').style.display = 'block';
        
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: chat.messages.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text })),
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });
            
            const data = await response.json();
            document.getElementById('typing').style.display = 'none';
            
            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                addMessageToUI(reply, 'assistant');
                chat.messages.push({ text: reply, sender: 'assistant' });
                chat.updated = new Date().toISOString();
                saveToUser();
                renderSidebar();
            } else {
                addMessageToUI('Error: ' + (data.error?.message || 'Unknown error'), 'assistant');
            }
        } catch (error) {
            document.getElementById('typing').style.display = 'none';
            addMessageToUI('Error: ' + error.message, 'assistant');
        }
    }

    function formatText(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                   .replace(/\n/g, '<br>');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        if (diff < 3600000) return 'Just now';
        if (diff < 86400000) return 'Today';
        return date.toLocaleDateString();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // Check saved session
    const saved = localStorage.getItem('curve_current');
    if (saved) {
        const data = JSON.parse(saved);
        const user = users.find(u => u.id === data.id);
        if (user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('avatar').innerText = user.username.charAt(0).toUpperCase();
            document.getElementById('username').innerText = user.username;
            conversations = user.chats || [];
            renderSidebar();
            if (conversations.length) loadChat(conversations[0].id);
            else newChat();
        }
    }
</script>
</body>
</html>
